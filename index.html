<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вайбоград — Воркшоп по вайбкодингу</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700&family=Montserrat:wght@700;900&family=Orbitron:wght@400;700;900&family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0B0E14;
            --neon-purple: #B537F2;
            --neon-cyan: #00F5FF;
            --neon-pink: #FF007A;
            --text: #F0F4FF;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(0, 245, 255, 0.15);
            --amber: #924800;
            --green: #0F5C2E;
            --violet: #5B1D9E;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(181, 55, 242, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 245, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, transparent 0%, transparent 15%, rgba(255,255,255,0.01) 15.2%, transparent 15.5%, transparent 30%, rgba(255,255,255,0.01) 30.2%, transparent 30.5%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .unbounded { font-family: 'Unbounded', sans-serif; text-transform: uppercase; }
        .orbitron { font-family: 'Orbitron', sans-serif; text-transform: uppercase; }
        .montserrat { font-family: 'Montserrat', sans-serif; text-transform: uppercase; }

        .gradient-text {
            background: linear-gradient(90deg, #FFFFFF 0%, var(--neon-purple) 45%, var(--neon-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .slide-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            padding-bottom: 90px; 
        }

        .slide {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            animation: slideFadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .slide.active { display: flex; }

        @keyframes slideFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(11, 14, 20, 0.95);
            border-top: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .progress-dots { 
            display: flex; 
            gap: 10px; 
            justify-content: center;
            align-items: center;
        }
        .dot { 
            min-width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            background: rgba(255,255,255,0.1); 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .dot.active { 
            background: var(--neon-cyan); 
            transform: scale(1.6); 
            box-shadow: 0 0 10px var(--neon-cyan); 
        }

        .slide-counter-nav {
            position: absolute;
            right: 40px;
            opacity: 0.3;
            font-weight: bold;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            pointer-events: none;
        }

        .btn-start {
            background: #B537F2;
            padding: 18px 70px;
            border-radius: 100px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 0 30px rgba(181, 55, 242, 0.5);
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }

        .expert-photo {
            width: 380px;
            height: 380px;
            border-radius: 50%;
            border: 4px solid var(--neon-purple);
            overflow: hidden;
            box-shadow: 0 0 60px rgba(181, 55, 242, 0.3);
            background: #12151c;
        }
        .expert-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-placeholder-16-9 {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .image-placeholder-16-9 img { width: 100%; height: 100%; object-fit: contain; }

        .code-block {
            background: #0D1117;
            border: 1px solid rgba(0, 245, 255, 0.2);
            font-family: 'Manrope', sans-serif;
            padding: 30px;
            border-radius: 16px;
            color: var(--neon-cyan);
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .tz-table { width: 100%; border-collapse: collapse; font-size: 1.15rem; }
        .tz-table th {
            text-align: left;
            padding: 16px 20px;
            background: rgba(0, 245, 245, 0.08);
            color: var(--neon-cyan);
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            font-weight: 900;
            border-bottom: 2px solid var(--glass-border);
        }
        .tz-table td { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); vertical-align: top; }
        .tz-label { font-weight: 800; color: white; }
        .tz-example { color: var(--neon-purple); font-style: italic; font-size: 1rem; }

        .hidden-row { opacity: 0 !important; transform: translateY(10px) !important; pointer-events: none !important; }
        .visible-row { opacity: 1 !important; transform: translateY(0) !important; pointer-events: auto !important; transition: 0.4s ease; }

        .practice-step {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .step-num {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 900;
            color: white;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div id="typeBadge" class="type-badge montserrat hidden"></div>

    <div class="slide-container" id="slides-root"></div>

    <div class="nav-bar">
        <div class="progress-dots" id="dots"></div>
        <span class="slide-counter-nav" id="counter">01/31</span>
    </div>

    <script>
        const slidesData = [
            // СЛАЙД 1: ТИТУЛЬНЫЙ (ИСПРАВЛЕНО РАЗМЕР)
            { 
                id: 1, type: 'title',

            },
            // СЛАЙД 4: ПРАВИЛА (УВЕЛИЧЕНО)
            {

                content: `<div class="flex flex-col items-center justify-center h-full w-full">

                            <span class="text-5xl">🤖</span>

            // СЛАЙД 5: НАСТРОИМСЯ НА ВАЙБ
            {

                content: `<div class="text-center h-full flex flex-col justify-center items-center">

            { id: 6, type: 'chapter', content: `<div class="text-center h-full flex flex-col justify-center items-center"><h3 class="unbounded opacity-5 text-[240px] absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">01</h3><p class="montserrat text-neon-purple tracking-widest mb-4 uppercase font-bold text-xl">БЛОК 1</p><h2 class="unbounded gradient-text text-[7rem]">ЭТАПЫ РАЗРАБОТКИ</h2></div>` },
            // СЛАЙД 7: ПУТЬ
            {

                content: `<div class="flex flex-col items-center justify-center h-full w-full">
                    <h2 class="orbitron gradient-text text-4xl mb-10 text-center uppercase font-black">ПУТЬ ОТ ИДЕИ К ПРОДУКТУ</h2>
                    <div class="image-placeholder-16-9">
                        <img src="images/steps.jpg" alt="Ferris Wheel Stages" onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=&quot;opacity-20 orbitron text-3xl&quot;>images/steps.jpg</span>'">
                    </div>
                </div>` 
            },
            // СЛАЙД 8: ЧТО СОЗДАЕМ
            { 
                id: 8, type: 'ВОПРОС ❓', 
                content: `<div class="flex flex-col items-center justify-center h-full"><h2 class="orbitron gradient-text text-[3.5rem] mb-12 uppercase font-black">ЧТО СОЗДАЕМ ВМЕСТЕ?</h2><div class="grid grid-cols-3 gap-6 w-full max-w-6xl">${['🎯 КВИЗ','📚 ОНЛАЙН-КУРС','🌐 САЙТ КУРСА'].map(v=>`<div class="glass-card p-14 text-center flex items-center justify-center border-orange-500/20 font-black text-2xl uppercase hover:scale-105 transition-all cursor-pointer">${v}</div>`).join('')}</div></div>` 
            },
            // СЛАЙД 9: ФОРМУЛА

                content: `<div class="flex flex-col items-center justify-center h-full w-full"><h2 class="orbitron text-green-500 text-4xl mb-8 uppercase font-black text-center">ФОРМУЛА ИДЕИ</h2><div class="glass-card p-12 border-green-500/30 text-2xl text-center italic max-w-5xl mx-auto mb-12 shadow-2xl">[Формат] для [аудитории], который помогает [проблема], вместо [как сейчас].</div><p class="orbitron text-neon-cyan text-sm mb-6 uppercase tracking-widest text-center">Если нет идеи, выбери одну:</p><div class="grid grid-cols-3 gap-4 w-full max-w-3xl">${['КВИЗ','ОНЛАЙН-КУРС','САЙТ-ПОРТФОЛИО'].map(i=>`<div class="glass-card p-4 text-center border-white/5 font-black text-[10px] uppercase">${i}</div>`).join('')}</div></div>` 
            },
            // БЛОК 2 И Т.Д.

                            <thead><tr><th class="w-1/4 uppercase">Раздел</th><th class="w-1/3 uppercase">Суть</th><th class="w-2/5 uppercase">Примеры</th></tr></thead>

                        </div>
                        <div class="glass-card p-12 border-pink-500/30 flex flex-col gap-6">
                            <div><h3 class="orbitron text-neon-pink text-3xl mb-6 font-black uppercase">🎨 UI — Оболочка</h3><p class="text-xl font-bold uppercase leading-tight text-white/90">Визуальный стиль и неон</p></div>
                            <div class="bg-pink-500/5 border border-pink-500/10 p-6 rounded-xl italic opacity-70 text-sm uppercase font-black">Пример: Фон #0B0E14, шрифт Unbounded</div>
                        </div>
                    </div>
                </div>` 
            },
            { id: 21, type: 'ДЕМО 🎬', content: `<div class="text-center h-full flex flex-col justify-center items-center"><h2 class="unbounded gradient-text text-[14rem] leading-none mb-4 tracking-tighter uppercase font-black">ДЕМО</h2></div>` },
            // СЛАЙД 30: ИТОГИ
            { 
                id: 30, type: 'info', 
                content: `<div class="flex flex-col items-center justify-center h-full w-full">
                    <h2 class="orbitron gradient-text text-[4rem] mb-16 uppercase font-black tracking-widest text-center">ИТОГИ ПУТЕШЕСТВИЯ</h2>
                    <div class="space-y-10 max-w-5xl text-2xl opacity-90 uppercase font-black tracking-widest text-center mx-auto leading-relaxed">
                        <p>0. Вайбкодинг: Новый майндсет</p>
                        <p>1. Этапы: От Идеи к ТЗ</p>
                        <p>2. ТЗ: Источник правды</p>
                        <p>3. Прототип: Код через ИИ</p>
                        <p>4. Итерации: Точечные правки</p>
                    </div>
                </div>` 
            },
            { id: 31, type: 'ВОПРОС ❓', content: `<div class="text-center flex flex-col justify-center h-full items-center"><h2 class="unbounded gradient-text text-[12rem] leading-none mb-10 tracking-tighter uppercase font-black">СПАСИБО! 🎉</h2><p class="orbitron opacity-40 text-4xl uppercase tracking-[0.5em] font-black uppercase">ДО ВСТРЕЧИ!</p></div>` }
        ];

        let currentIndex = 0;
        let currentSubStep = 0;

        function render() {
            const root = document.getElementById('slides-root');
            root.innerHTML = slidesData.map((s, idx) => `
                <div class="slide ${idx === currentIndex ? 'active' : ''}" id="slide-${idx+1}" data-type="${s.type.includes('info') || s.type === 'title' || s.type === 'chapter' ? '' : s.type}">
                    ${s.content}
                </div>
            `).join('');
            updateUI();
        }

        function updateUI() {
            const currentSlideData = slidesData[currentIndex];
            const slideEl = document.getElementById(`slide-${currentIndex+1}`);
            document.getElementById('counter').innerText = `${String(currentIndex+1).padStart(2, '0')}/${String(slidesData.length).padStart(2, '0')}`;
            const dots = document.getElementById('dots');
            dots.innerHTML = slidesData.map((_, i) => `<div class="dot ${i === currentIndex ? 'active' : ''}" onclick="goTo(${i})"></div>`).join('');
            const badge = document.getElementById('typeBadge');
            const typeText = slideEl.getAttribute('data-type');
            if (typeText) {
                badge.innerText = typeText;
                badge.classList.remove('hidden');
                badge.className = 'type-badge montserrat ' + (typeText.includes('ВОПРОС') ? 'badge-question' : typeText.includes('ПРАКТИКА') ? 'badge-practice' : 'badge-demo');
            } else { badge.classList.add('hidden'); }

            if (currentSlideData.isSequential) {
                const rows = slideEl.querySelectorAll('.step-row');
                rows.forEach((row, index) => {
                    if (index < currentSubStep) { row.classList.add('visible-row'); row.classList.remove('hidden-row'); }
                    else { row.classList.add('hidden-row'); row.classList.remove('visible-row'); }
                });
            }
        }

        function changeSlide(dir) {
            const currentSlideData = slidesData[currentIndex];
            if (dir > 0) {
                if (currentSlideData.isSequential && currentSubStep < currentSlideData.totalSubSteps) { currentSubStep++; updateUI(); }
                else if (currentIndex < slidesData.length - 1) { currentIndex++; currentSubStep = 0; render(); }
            } else {
                if (currentSubStep > 0) { currentSubStep--; updateUI(); }
                else if (currentIndex > 0) { currentIndex--; const prevSlideData = slidesData[currentIndex]; currentSubStep = prevSlideData.isSequential ? prevSlideData.totalSubSteps : 0; render(); }
            }
        }

        function goTo(idx) { currentIndex = idx; currentSubStep = 0; render(); }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); changeSlide(1); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); changeSlide(-1); }
        });

        render();
    </script>
</body>
</html>
